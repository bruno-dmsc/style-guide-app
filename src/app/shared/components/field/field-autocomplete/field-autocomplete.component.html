<div class="desmonte-field">
    <label *ngIf="label" 
           class="desmonte-field__label" 
           [class.desmonte-field__label--required]="required">
      {{ label }}
    </label>
    
    <!-- Wrapper relativo para segurar a lupa -->
    <div class="autocomplete-wrapper">
      <p-autoComplete 
      [ngModel]="value" 
      (ngModelChange)="onModelChange($event)"
      [suggestions]="suggestions" 
      (completeMethod)="filterData($event)" 
      [field]="field" 
      [placeholder]="placeholder"
      [disabled]="disabled"
      [ngClass]="{'ng-invalid ng-dirty': hasError}"
      styleClass="w-full"
      [emptyMessage]="'Nenhum resultado encontrado'">>
        
        <!-- Fallback quando não encontra resultados -->
        <ng-template pTemplate="empty">
          <div class="autocomplete-empty-state">
            <p class="empty-message">Nenhum resultado para "<strong>{{ currentQuery }}</strong>"</p>
            <button type="button" class="btn-advanced-search" (click)="triggerAdvancedSearch()">
              <i class="pi pi-search-plus"></i> Abrir busca avançada
            </button>
          </div>
        </ng-template>
  
      </p-autoComplete>
  
      <!-- O botão da Lupa estruturado para a sua Modal -->
      <i class="pi pi-search autocomplete-search-icon" 
         (click)="triggerAdvancedSearch()" 
         title="Pesquisa Avançada"></i>
    </div>
  
    <p *ngIf="hasError" class="desmonte-field__error-message">
      Campo obrigatório
    </p>
  </div>
